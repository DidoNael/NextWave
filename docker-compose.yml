services:
  evolution-api:
    build:
      context: .
      dockerfile: evolution-api.Dockerfile
    image: evolution-api-patched:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8081
      - SERVER_URL=http://evolution-api:8081
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-nextwave_evo_temp_key}
      - LOG_LEVEL=ERROR
      - DATABASE_ENABLED=true
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://root:${POSTGRES_PASSWORD}@nextwave-db:5432/nextwave_crm?schema=public
    volumes:
      - evolution-data:/app/evolution/instances
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nextwave_network
      - nginx

  nextwave-crm:
    build:
      context: .
      dockerfile: Dockerfile
    image: nextwave-crm:latest
    container_name: nextwave-crm
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3010"
    environment:
      - DATABASE_URL=postgresql://root:${POSTGRES_PASSWORD}@nextwave-db:5432/nextwave_crm?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-nextwave_setup_secret_2026}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-nextwave_evo_temp_key}
    volumes:
      - nextwave-setup:/var/shared
    depends_on:
      nextwave-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3010/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - nextwave_network
      - nginx

  nextwave-db:
    image: postgres:15-alpine
    container_name: nextwave-db
    restart: unless-stopped
    entrypoint: [ "/bin/bash", "/var/shared/db-sovereign-init.sh" ]
    environment:
      - POSTGRES_USER=root
      # O nome do banco inicial não importa tanto aqui, o Wizard criará o correto
      - POSTGRES_DB=postgres 
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - nextwave-setup:/var/shared
      - ./db-sovereign-init.sh:/var/shared/db-sovereign-init.sh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U root -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextwave_network
      - nginx

volumes:
  evolution-data:
    driver: local
  postgres-data:
    driver: local
  nextwave-setup:
    driver: local

networks:
  nextwave_network:
    name: nextwave_network
    driver: bridge
  nginx:
    name: nginx
    external: true
